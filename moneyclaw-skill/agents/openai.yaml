interface:
  display_name: "MoneyClaw"
  short_description: "Inspect wallet readiness, create approval-based payment tasks, and continue user-confirmed payment steps"
  default_prompt: "Use $moneyclaw only when the user explicitly asks to use their own MoneyClaw account. Start by checking wallet readiness. Default to approval-based payment tasks. Do not retrieve execution details or verification messages until the user asks to continue the exact payment step."

policy:
  allow_implicit_invocation: false
